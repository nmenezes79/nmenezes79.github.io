<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="style.css" rel="stylesheet">
    <title>Multimaker</title>
</head>

<body>
    <div id="wrapper">
        <div id="left">
            <div id="signin">
                <div class="logo">
                    <img src="img/Login-Logo.png" alt="Multimaker">
                </div>
                <form>
                    <div>
                        <label>Email or User Name</label>
                        <input type="text" class="text-input">
                    </div>
                    <div>
                        <label>Password</label>
                        <input type="password" class="text-input">
                    </div>
                    <button type="submit" class="primary-btn">Sign In</button>
                </form>
                <div class="links">
                    <a href="#">Forgot Password</a>
                    <a href="#">Sign In With Company Id</a>
                </div>
                <div class="or">
                    <hr class="bar">
                    <span>OR</span>
                    <hr class="bar">
                </div>
                <a href="#" class="secondary-btn">Create An Account</a>
            </div>
            <footer id="main-footer">
                <p>Copyright &copy; 2020, Multimaker All Rights Reserved</p>
                <div>
                    <a href="#">Terms Of Use</a> | <a href="#">Privacy Policy</a>
                </div>
            </footer>
        </div>
        <div id="right">
            <div id="showcase">
                <div class="showcase-content">
                    <h1 class="showcase-text">A Better Tomorrow Starts <strong>TODAY</strong></h1>
                    <a href="#" class="secondary-btn">Start A Free 10 Day Trial</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
